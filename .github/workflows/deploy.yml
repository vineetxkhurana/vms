name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual deploys from GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-progress deploy

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run full quality gate before deploying
      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # Build for Cloudflare Pages (next-on-pages)
      - name: Build
        run: npm run pages:build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      # Deploy to Cloudflare Pages
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=vms --commit-dirty=true
