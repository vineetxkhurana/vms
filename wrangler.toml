name = "vms-ecommerce"
compatibility_date = "2024-03-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "vms-db"
database_id = "YOUR_D1_DATABASE_ID"  # run: wrangler d1 create vms-db

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "vms-assets"

[vars]
NEXT_PUBLIC_APP_URL = "https://vms.pages.dev"
NEXT_PUBLIC_RAZORPAY_KEY_ID = "rzp_live_xxxxxxxxxxxx"  # also set in secrets for safety

# Secrets set via: wrangler secret put <NAME>
# JWT_SECRET              — openssl rand -base64 32
# RAZORPAY_KEY_ID         — from Razorpay dashboard
# RAZORPAY_KEY_SECRET     — from Razorpay dashboard
# RAZORPAY_WEBHOOK_SECRET — from Razorpay Dashboard → Webhooks → secret
